name: Release

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 0"

permissions:
  contents: write

env:
  BINARY_NAME: k_backup

jobs:
  update-and-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      has_changes: ${{ steps.check.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - name: Cargo update
        run: cargo update

      - name: Check for changes since last release
        id: check
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ] || [ -n "$(git diff "$LAST_TAG")" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No changes since $LAST_TAG, skipping release."
          fi

      - name: Run tests
        if: steps.check.outputs.has_changes == 'true'
        run: cargo test --release --features "fully-static vendored-openssl"

      - name: Build release binary
        if: steps.check.outputs.has_changes == 'true'
        run: cargo build --release --features fully-static

      - name: Upload x86_64 artifact
        if: steps.check.outputs.has_changes == 'true'
        run: |
          mkdir -p dist
          cp target/release/${{ env.BINARY_NAME }} dist/k_backup-linux-amd64

      - uses: actions/upload-artifact@v4
        if: steps.check.outputs.has_changes == 'true'
        with:
          name: k_backup-linux-amd64
          path: dist/k_backup-linux-amd64

      - name: Generate tag and push
        if: steps.check.outputs.has_changes == 'true'
        id: tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet Cargo.lock; then
            git add Cargo.lock
            git commit -m "chore: cargo update"
          fi
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          TAG="v${VERSION}-$(date -u +%Y%m%d%H%M%S)"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          git tag "$TAG"
          git push origin HEAD --tags

  build-arm64:
    needs: update-and-tag
    if: needs.update-and-tag.outputs.has_changes == 'true'
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.update-and-tag.outputs.tag }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release --features fully-static

      - name: Package
        run: |
          mkdir -p dist
          cp target/release/${{ env.BINARY_NAME }} dist/k_backup-linux-arm64

      - uses: actions/upload-artifact@v4
        with:
          name: k_backup-linux-arm64
          path: dist/k_backup-linux-arm64

  release:
    needs: [update-and-tag, build-arm64]
    if: needs.update-and-tag.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.update-and-tag.outputs.tag }}
          generate_release_notes: true
          files: artifacts/**/*
