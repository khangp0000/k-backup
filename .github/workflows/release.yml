name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

env:
  BINARY_NAME: k_backup

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.check.outputs.version_changed }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check if version newer than last tag
        id: check
        run: |
          CURRENT=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//' || echo "0.0.0")
          echo "Current: $CURRENT, Last tag: $LAST_TAG"
          if [ "$CURRENT" != "$LAST_TAG" ]; then
            echo "version_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "version_changed=false" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$CURRENT" >> "$GITHUB_OUTPUT"

  test-and-build:
    needs: check-version
    if: needs.check-version.outputs.version_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        run: cargo test --locked --features "bundled-sqlite"

      - name: Build release binary
        run: cargo build --release --locked --features fully-static

      - name: Package
        run: |
          mkdir -p dist
          cp target/release/${{ env.BINARY_NAME }} dist/k_backup-linux-amd64

      - uses: actions/upload-artifact@v7
        with:
          name: k_backup-linux-amd64
          path: dist/k_backup-linux-amd64

  build-arm64:
    needs: check-version
    if: needs.check-version.outputs.version_changed == 'true'
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release --locked --features fully-static

      - name: Package
        run: |
          mkdir -p dist
          cp target/release/${{ env.BINARY_NAME }} dist/k_backup-linux-arm64

      - uses: actions/upload-artifact@v7
        with:
          name: k_backup-linux-arm64
          path: dist/k_backup-linux-arm64

  release:
    needs: [check-version, test-and-build, build-arm64]
    if: needs.check-version.outputs.version_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v7
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          generate_release_notes: true
          files: artifacts/**/*
