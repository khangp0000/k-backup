name: Auto Bump

on:
  # schedule:
  #   - cron: "0 3 * * 0"
  workflow_dispatch:
  push:
    branches: [main]
    paths: [Cargo.lock]

concurrency:
  group: bump
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_PRIVATE_KEY }}

      - uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Fetch bump branch for lease
        run: git fetch origin chore/weekly-bump 2>/dev/null || true

      - uses: dtolnay/rust-toolchain@stable

      - name: Check if bump needed
        id: check
        run: |
          CURRENT=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
          if git describe --tags --abbrev=0 >/dev/null 2>&1; then
            LAST_TAG=$(git describe --tags --abbrev=0 | sed 's/^v//')
            COMMITS_SINCE=$(git log "v${LAST_TAG}..HEAD" --oneline -- src/ Cargo.toml Cargo.lock | wc -l)
          else
            LAST_TAG="0.0.0"
            COMMITS_SINCE=999
          fi
          echo "Current: $CURRENT, Last tag: $LAST_TAG, Commits since: $COMMITS_SINCE"
          if [ "$CURRENT" = "$LAST_TAG" ] && [ "$COMMITS_SINCE" -gt "0" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Changes exist since last release, bump needed."
          else
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No changes or already bumped, skipping."
          fi

      - name: Create or update bump PR
        if: steps.check.outputs.skip == 'false'
        run: |
          BRANCH="chore/weekly-bump"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH" origin/main
          CURRENT=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
          MAJOR=$(echo $CURRENT | cut -d. -f1)
          MINOR=$(echo $CURRENT | cut -d. -f2)
          PATCH=$(echo $CURRENT | cut -d. -f3)
          NEW="${MAJOR}.${MINOR}.$((PATCH + 1))"
          sed -i "s/^version = \"$CURRENT\"/version = \"$NEW\"/" Cargo.toml
          cargo update --workspace
          git add Cargo.toml Cargo.lock
          git commit -m "chore: bump version to $NEW"
          git push -u origin "$BRANCH" --force-with-lease || { echo "Another bump run won the race, skipping."; exit 0; }
          if ! gh pr view "$BRANCH" --json state -q '.state' 2>/dev/null | grep -q "OPEN"; then
            gh pr create \
              --title "chore: bump version to $NEW" \
              --body "Automated version bump for release." \
              --base main --head "$BRANCH"
          fi
          gh pr merge --auto --rebase "$BRANCH"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
