name: Weekly Bump

on:
  schedule:
    - cron: "0 3 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.PAT_TOKEN_BUMP }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Check if deps are outdated
        id: check
        run: |
          cargo update
          if git diff --quiet Cargo.lock; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Dependencies are up to date, skipping bump."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Newer dependencies available, proceeding with bump."
          fi

      - name: Bump patch version
        if: steps.check.outputs.skip == 'false'
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)
          NEW="${MAJOR}.${MINOR}.$((PATCH + 1))"
          sed -i "s/^version = \"$VERSION\"/version = \"$NEW\"/" Cargo.toml
          echo "Bumped $VERSION → $NEW"

      - name: Run tests
        if: steps.check.outputs.skip == 'false'
        run: cargo test --features "bundled-sqlite"

      - name: Commit and push
        if: steps.check.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          git commit -m "chore: bump version to $VERSION"
          git push
