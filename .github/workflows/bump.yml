name: Weekly Bump

on:
  # schedule:
  #   - cron: "0 3 * * 0"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN_BUMP }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Check if bump needed
        id: check
        run: |
          CURRENT=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
          if git describe --tags --abbrev=0 >/dev/null 2>&1; then
            LAST_TAG=$(git describe --tags --abbrev=0 | sed 's/^v//')
            COMMITS_SINCE=$(git log "v${LAST_TAG}..HEAD" --oneline -- src/ Cargo.toml Cargo.lock | wc -l)
          else
            LAST_TAG="0.0.0"
            COMMITS_SINCE=999
          fi
          echo "Current: $CURRENT, Last tag: $LAST_TAG, Commits since: $COMMITS_SINCE"
          if [ "$CURRENT" = "$LAST_TAG" ] && [ "$COMMITS_SINCE" -gt "0" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Changes exist since last release, bump needed."
          else
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No changes or already bumped, skipping."
          fi

      - name: Bump patch version
        if: steps.check.outputs.skip == 'false'
        id: bump
        run: |
          CURRENT=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
          MAJOR=$(echo $CURRENT | cut -d. -f1)
          MINOR=$(echo $CURRENT | cut -d. -f2)
          PATCH=$(echo $CURRENT | cut -d. -f3)
          NEW="${MAJOR}.${MINOR}.$((PATCH + 1))"
          sed -i "s/^version = \"$CURRENT\"/version = \"$NEW\"/" Cargo.toml
          echo "Bumped $CURRENT → $NEW"
          echo "version=$NEW" >> "$GITHUB_OUTPUT"

      - name: Create or update bump PR
        if: steps.check.outputs.skip == 'false'
        run: |
          BRANCH="chore/weekly-bump"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH"
          git add Cargo.toml
          git commit -m "chore: bump version to ${{ steps.bump.outputs.version }}"
          git push -u origin "$BRANCH" --force
          if ! gh pr view "$BRANCH" --json state -q '.state' 2>/dev/null | grep -q "OPEN"; then
            gh pr create \
              --title "chore: bump version to ${{ steps.bump.outputs.version }}" \
              --body "Automated version bump for release." \
              --base main --head "$BRANCH"
          fi
          gh pr merge --auto --rebase "$BRANCH"
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN_BUMP }}
